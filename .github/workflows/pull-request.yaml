name: Pull request analysis

on:
  pull_request:
    branches:
    - "*"

jobs:
  labels:
    name: Autodetect labels 🔍
    runs-on: ubuntu-latest
    steps:
    - name: Autodetect labels 🔍
      uses: tchoupinax/repo-config/shared-actions/steps/dx/automatically-apply-labels@v0
      with:
        appId: ${{ secrets.DEPLOY_APP_ID }}
        privateKey: ${{ secrets.DEPLOY_APP_KEY }}

  build-ui:
    name: "🟢 Build user interface (Nuxt.js project)"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: "Setup PNPM"
      uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

    - name: Use Node.js 25
      uses: actions/setup-node@v6
      with:
        node-version: 25
        cache: "pnpm"

    - name: Build, lint and test the package
      run: |
        pnpm install --frozen-lockfile --filter webapp
        pnpm build --filter webapp

  build-server:
    name: "🟣 Build server and generate prisma"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: "Setup PNPM"
      uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

    - name: Use Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: "pnpm"

    - name: "Build, lint and test the package"
      run: |
        pnpm install --frozen-lockfile --filter server
        pnpm build --filter server
      env:
        API_URL: "_"
        CI_COMMIT_SHA: "_"
        CI_PIPELINE_CREATED: "1"
        DATABASE_URL: "_"
        JOB_DEFAULT_TIMEOUT: "_"
        OIDC_CLIENT_ID: "_"
        OIDC_CLIENT_SECRET: "_"
        OIDC_CONFIGURATION_URL: "_"
        OIDC_PROVIDER_IMAGE: "_"
        OIDC_PROVIDER_NAME: "_"
        UI_URL: "_"
        VAULT_ADDR: "_"
        VAULT_PATH: "_"
        VAULT_TOKEN: "_"

  build-agent:
    name: "🔵 Build agent binary"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    #- name: Install OpenSSL dependencies
    #  run: |
    #    sudo apt-get update
    #    sudo apt-get install -y pkg-config libssl-dev
    - uses: mlugg/setup-zig@v2
    #- uses: sigstore/cosign-installer@v4.1.1
    #- uses: anchore/sbom-action/download-syft@v0.24.0
    - name: Compile with goreleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        args: "release --clean --snapshot"
        version: "~> v2"
        workdir: "agent"
